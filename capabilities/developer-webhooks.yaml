naftiko: 1.0.0-alpha2
info:
  label: Copper Developer API — Webhooks
  description: 'Copper Developer API — Webhooks. 3 operations. Lead operation: List Webhooks. Self-contained Naftiko capability
    covering one Copper business surface.'
  tags:
  - Copper
  - Webhooks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COPPER_API_KEY: COPPER_API_KEY
capability:
  consumes:
  - type: http
    namespace: developer-webhooks
    baseUri: https://api.copper.com/developer_api/v1
    description: Copper Developer API — Webhooks business capability. Self-contained, no shared references.
    resources:
    - name: webhooks
      path: /webhooks
      operations:
      - name: listwebhooks
        method: GET
        description: List Webhooks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createwebhook
        method: POST
        description: Create a Webhook subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: webhooks-id
      path: /webhooks/{id}
      operations:
      - name: deletewebhook
        method: DELETE
        description: Delete a Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-PW-AccessToken
      value: '{{env.COPPER_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: developer-webhooks-rest
    port: 8080
    description: REST adapter for Copper Developer API — Webhooks. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/webhooks
      name: webhooks
      description: REST surface for webhooks.
      operations:
      - method: GET
        name: listwebhooks
        description: List Webhooks
        call: developer-webhooks.listwebhooks
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createwebhook
        description: Create a Webhook subscription
        call: developer-webhooks.createwebhook
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhooks/{id}
      name: webhooks-id
      description: REST surface for webhooks-id.
      operations:
      - method: DELETE
        name: deletewebhook
        description: Delete a Webhook
        call: developer-webhooks.deletewebhook
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: developer-webhooks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Copper Developer API — Webhooks. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-webhooks
      description: List Webhooks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: developer-webhooks.listwebhooks
      outputParameters:
      - type: object
        mapping: $.
    - name: create-webhook-subscription
      description: Create a Webhook subscription
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: developer-webhooks.createwebhook
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-webhook
      description: Delete a Webhook
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: developer-webhooks.deletewebhook
      outputParameters:
      - type: object
        mapping: $.
