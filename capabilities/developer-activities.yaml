naftiko: 1.0.0-alpha2
info:
  label: Copper Developer API — Activities
  description: 'Copper Developer API — Activities. 2 operations. Lead operation: Create an Activity. Self-contained Naftiko
    capability covering one Copper business surface.'
  tags:
  - Copper
  - Activities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COPPER_API_KEY: COPPER_API_KEY
capability:
  consumes:
  - type: http
    namespace: developer-activities
    baseUri: https://api.copper.com/developer_api/v1
    description: Copper Developer API — Activities business capability. Self-contained, no shared references.
    resources:
    - name: activities
      path: /activities
      operations:
      - name: createactivity
        method: POST
        description: Create an Activity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: activities-search
      path: /activities/search
      operations:
      - name: searchactivities
        method: POST
        description: Search Activities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-PW-AccessToken
      value: '{{env.COPPER_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: developer-activities-rest
    port: 8080
    description: REST adapter for Copper Developer API — Activities. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/activities
      name: activities
      description: REST surface for activities.
      operations:
      - method: POST
        name: createactivity
        description: Create an Activity
        call: developer-activities.createactivity
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/activities/search
      name: activities-search
      description: REST surface for activities-search.
      operations:
      - method: POST
        name: searchactivities
        description: Search Activities
        call: developer-activities.searchactivities
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: developer-activities-mcp
    port: 9090
    transport: http
    description: MCP adapter for Copper Developer API — Activities. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: create-activity
      description: Create an Activity
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: developer-activities.createactivity
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: search-activities
      description: Search Activities
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: developer-activities.searchactivities
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
