    TaskNew:
      name: TaskNew
      title: task.new
      summary: One or more tasks were created.
      contentType: application/json
      traits:
        - $ref: '#/components/messageTraits/CopperWebhookHeaders'
      payload:
        allOf:
          - $ref: '#/components/schemas/WebhookEnvelope'
          - type: object
            properties:
              type:
                const: task
              event:
                const: new

    TaskUpdate:
      name: TaskUpdate
      title: task.update
      summary: One or more tasks had fields changed.
      contentType: application/json
      traits:
        - $ref: '#/components/messageTraits/CopperWebhookHeaders'
      payload:
        allOf:
          - $ref: '#/components/schemas/WebhookUpdateEnvelope'
          - type: object
            properties:
              type:
                const: task
              event:
                const: update

    TaskDelete:
      name: TaskDelete
      title: task.delete
      summary: One or more tasks were deleted.
      contentType: application/json
      traits:
        - $ref: '#/components/messageTraits/CopperWebhookHeaders'
      payload:
