          - $ref: '#/components/schemas/WebhookEnvelope'
          - type: object
            properties:
              type:
                const: task
              event:
                const: delete

  schemas:
    WebhookEnvelope:
      type: object
      description: |
        Standard Copper webhook notification envelope. Fields documented at
        https://developer.copper.com/webhooks/notification-example.html.
        Custom authentication key/value pairs configured on the
        subscription's `secret` are passed through as additional
        `secret_field_*` properties on the root object.
      required:
        - ids
        - type
        - event
        - subscription_id
        - timestamp
      additionalProperties: true
      properties:
        ids:
          type: array
          description: |
            IDs of the entities affected by the event. Each notification
            carries 1-30 IDs; larger batches are split across multiple
            notifications.
          minItems: 1
          maxItems: 30
          items:
            type: integer
            format: int64
        type:
          type: string
          description: |
            Entity type the subscription is scoped to. Mirrors the
            subscription's `type` field.
          enum:
            - lead
            - person
            - company
            - opportunity
            - project
            - task
        event:
          type: string
          description: |
            Event category the subscription is scoped to. Mirrors the
            subscription's `event` field.
          enum:
            - new
            - update
            - delete
        subscription_id:
          type: integer
          format: int64
          description: ID of the Copper webhook subscription that produced this delivery.
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp at which the event occurred.

    WebhookUpdateEnvelope:
      allOf:
        - $ref: '#/components/schemas/WebhookEnvelope'
        - type: object
          description: |
            Update-event variant. Adds `updated_attributes`, which
            enumerates only the fields whose values changed.
          properties:
            updated_attributes:
              $ref: '#/components/schemas/UpdatedAttributes'

    UpdatedAttributes:
      type: object
      description: |
        Map of changed field names to `[old_value, new_value]` pairs.
        Present only on `update` events. `custom_fields` is a nested
        object keyed by custom-field ID; when the subscription was
        created with `custom_field_computed_values: true`, dropdown and
        multi-select dropdown values are resolved to their display names
        instead of numeric option IDs.
      additionalProperties:
        type: array
        minItems: 2
        maxItems: 2
        items:
          description: '[0] is the prior value; [1] is the new value.'
      properties:
        custom_fields:
          type: object
          description: |
            Changes to custom-field values, keyed by custom-field ID.
          additionalProperties:
            type: array
            minItems: 2
            maxItems: 2
            items:
              description: '[0] is the prior value; [1] is the new value.'
