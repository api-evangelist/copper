    OpportunityUpdate:
      name: OpportunityUpdate
      title: opportunity.update
      summary: One or more opportunities had fields changed.
      contentType: application/json
      traits:
        - $ref: '#/components/messageTraits/CopperWebhookHeaders'
      payload:
        allOf:
