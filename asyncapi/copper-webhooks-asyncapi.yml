    OpportunityDelete:
      name: OpportunityDelete
      title: opportunity.delete
      summary: One or more opportunities were deleted.
      contentType: application/json
      traits:
        - $ref: '#/components/messageTraits/CopperWebhookHeaders'
      payload:
        allOf:
