      contentType: application/json
      traits:
        - $ref: '#/components/messageTraits/CopperWebhookHeaders'
      payload:
        allOf:
          - $ref: '#/components/schemas/WebhookEnvelope'
          - type: object
            properties:
              type:
                const: project
              event:
                const: new

    ProjectUpdate:
      name: ProjectUpdate
      title: project.update
      summary: One or more projects had fields changed.
      contentType: application/json
      traits:
        - $ref: '#/components/messageTraits/CopperWebhookHeaders'
      payload:
        allOf:
          - $ref: '#/components/schemas/WebhookUpdateEnvelope'
          - type: object
            properties:
