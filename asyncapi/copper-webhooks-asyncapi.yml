asyncapi: '2.6.0'
info:
  title: Copper CRM Webhooks
  version: '1.0.0'
  description: |
    AsyncAPI definition for the Copper CRM webhook surface. Copper webhooks
    are HTTP POST deliveries from Copper to a subscriber-defined `target`
    URL that was registered via the Copper Developer API
    (`POST /developer_api/v1/webhooks`).

    Each subscription is scoped to a single (`type`, `event`) pair, where
    `type` is one of `lead`, `person`, `company`, `opportunity`, `project`,
    or `task`, and `event` is one of `new`, `update`, or `delete`. Each
    delivery is a JSON document containing an `ids` array (1-30 entity IDs
    affected by the event), the `type` and `event` of the subscription,
    the originating `subscription_id`, an ISO 8601 `timestamp`, and on
    `update` events an `updated_attributes` object whose properties are
    `[old_value, new_value]` pairs. Custom authentication key/value pairs
    configured on the subscription's `secret` are echoed as top-level
    `secret_field_*` fields, and custom HTTP headers configured on the
    subscription are passed through on every delivery.

    Only `https://` endpoints are accepted as the notification `target`.
    Deliveries fire at most once per event and are not retried. Copper
    limits each account to 600 notifications per minute, 1,800 per ten
    minutes, and at most 100 active subscriptions.

    Sourced from https://developer.copper.com/webhooks/overview.html,
    https://developer.copper.com/webhooks/create-new-subscription.html,
    and https://developer.copper.com/webhooks/notification-example.html.
    Fields not documented by Copper are not invented here.
  contact:
    name: Copper Developer Support
    url: https://developer.copper.com/
  license:
    name: Proprietary
    url: https://www.copper.com/terms-of-service
  tags:
    - name: Copper
    - name: CRM
    - name: Webhooks
    - name: Leads
    - name: People
    - name: Companies
    - name: Opportunities
    - name: Projects
    - name: Tasks

defaultContentType: application/json

servers:
  subscriber:
    url: '{target}'
    protocol: https
    description: |
      The HTTPS endpoint that the webhook subscriber registers with Copper
      as the subscription's `target`. Copper delivers all notifications
      for the subscription's (`type`, `event`) pair to this URL via HTTP
      POST with a JSON body.
    variables:
      target:
        description: Subscriber-controlled HTTPS URL configured on the Copper webhook.
        default: https://example.com/webhooks/copper

