components:
  messageTraits:
    CopperWebhookHeaders:
      headers:
        type: object
        description: |
          Standard delivery headers. Any custom HTTP headers configured on
          the webhook subscription's `headers` map are passed through on
          every delivery in addition to these.
        properties:
          Content-Type:
            type: string
            const: application/json

  messages:
    LeadNew:
      name: LeadNew
      title: lead.new
      summary: One or more leads were created.
      contentType: application/json
      traits:
        - $ref: '#/components/messageTraits/CopperWebhookHeaders'
      payload:
        allOf:
          - $ref: '#/components/schemas/WebhookEnvelope'
          - type: object
            properties:
              type:
                const: lead
              event:
                const: new

    LeadUpdate:
      name: LeadUpdate
      title: lead.update
      summary: One or more leads had fields changed.
      contentType: application/json
      traits:
        - $ref: '#/components/messageTraits/CopperWebhookHeaders'
      payload:
        allOf:
          - $ref: '#/components/schemas/WebhookUpdateEnvelope'
          - type: object
            properties:
              type:
                const: lead
              event:
                const: update

    LeadDelete:
      name: LeadDelete
      title: lead.delete
      summary: One or more leads were deleted.
      contentType: application/json
      traits:
        - $ref: '#/components/messageTraits/CopperWebhookHeaders'
      payload:
        allOf:
          - $ref: '#/components/schemas/WebhookEnvelope'
          - type: object
            properties:
              type:
                const: lead
              event:
                const: delete

    PersonNew:
      name: PersonNew
      title: person.new
      summary: One or more people were created.
      contentType: application/json
      traits:
        - $ref: '#/components/messageTraits/CopperWebhookHeaders'
      payload:
        allOf:
          - $ref: '#/components/schemas/WebhookEnvelope'
          - type: object
            properties:
              type:
                const: person
              event:
                const: new

    PersonUpdate:
      name: PersonUpdate
      title: person.update
      summary: One or more people had fields changed.
      contentType: application/json
      traits:
        - $ref: '#/components/messageTraits/CopperWebhookHeaders'
      payload:
        allOf:
          - $ref: '#/components/schemas/WebhookUpdateEnvelope'
          - type: object
            properties:
              type:
                const: person
              event:
                const: update

    PersonDelete:
      name: PersonDelete
      title: person.delete
      summary: One or more people were deleted.
      contentType: application/json
      traits:
        - $ref: '#/components/messageTraits/CopperWebhookHeaders'
      payload:
        allOf:
          - $ref: '#/components/schemas/WebhookEnvelope'
          - type: object
            properties:
              type:
                const: person
              event:
                const: delete

    CompanyNew:
      name: CompanyNew
      title: company.new
      summary: One or more companies were created.
      contentType: application/json
      traits:
        - $ref: '#/components/messageTraits/CopperWebhookHeaders'
      payload:
        allOf:
          - $ref: '#/components/schemas/WebhookEnvelope'
          - type: object
            properties:
