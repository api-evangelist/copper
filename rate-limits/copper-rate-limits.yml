specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Copper
providerId: copper
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - CRM
description: Copper REST API rate limits per account.
sources:
  - https://www.copper.com/pricing
  - https://developer.copper.com/general/rate-limits.html
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: REST API (default)
    scope: account
    metric: requests_per_minute
    limit: 600
    timeFrame: minute
  - name: REST API per second
    scope: account
    metric: requests_per_second
    limit: 10
    timeFrame: second
