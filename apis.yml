apis:
  - aid: copper:developer-api
    name: Copper Developer API
    description: The Copper Developer API is a RESTful JSON API providing programmatic access to Copper
      CRM resources including people, companies, leads, opportunities, projects, tasks, activities, and
      webhooks. The API uses token-based authentication with three required headers (X-PW-AccessToken,
      X-PW-Application, X-PW-UserEmail) and supports full CRUD operations, search, bulk actions, and lead
      conversion. Rate limits are 180 requests per minute and 3 requests per second for bulk operations.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
