description: Copper is a CRM platform built natively for Google Workspace, designed to help teams cultivate
  enduring client relationships through purposeful collaboration. Copper offers a RESTful Developer API
  providing programmatic access to People, Companies, Leads, Opportunities, Projects, Tasks, Activities,
  Webhooks, and related resources for CRM integration and automation.
